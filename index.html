<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧪 Neurokey — Test Reports</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container { max-width: 640px; width: 100%; padding: 2rem; }
    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle { text-align: center; color: #94a3b8; margin-bottom: 2rem; font-size: 0.95rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    a.card {
      display: block;
      padding: 1.75rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      text-decoration: none;
      color: #e2e8f0;
      transition: all 0.2s;
      text-align: center;
    }
    a.card:hover {
      border-color: #60a5fa;
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(96, 165, 250, 0.2);
    }
    .card .emoji { font-size: 2.2rem; margin-bottom: 0.5rem; }
    .card .name { font-size: 1.15rem; font-weight: 600; }
    .card .desc { font-size: 0.82rem; color: #94a3b8; margin-top: 0.4rem; }
    .footer { text-align: center; margin-top: 2rem; color: #475569; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Neurokey — Allure Reports</h1>
    <p class="subtitle">Выберите стенд для просмотра отчёта</p>
    <div class="grid">
      <a class="card" href="./dev/">
        <div class="emoji">🟢</div>
        <div class="name">DEV</div>
        <div class="desc">wmt1.acm-ai.ru</div>
      </a>
      <a class="card" href="./prod/">
        <div class="emoji">🔴</div>
        <div class="name">PROD</div>
        <div class="desc">app.neiroklyuch.ru</div>
      </a>
    </div>
    <div class="footer">Neurokey autotests · Playwright + Python + Allure</div>
  </div>
</body>
</html>
