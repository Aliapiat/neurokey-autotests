[pytest]
addopts =
    -v
    --tb=short
    --strict-markers
    --alluredir=allure-results

markers =
    smoke: Smoke-тесты — критический путь
    login: Тесты авторизации
    auth: Общие тесты аутентификации / редиректов
    chat: Тесты чата и создания чатов
    messaging: Тесты сообщений
    models: Тесты переключения моделей
    responsive: Тесты адаптивной вёрстки
    real_backend: Требуют реальных кредов ADMIN_EMAIL/ADMIN_PASSWORD

testpaths = tests
